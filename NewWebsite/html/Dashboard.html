<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/newstyles.css">
</head>
<body style="background-color: black;">
    <div class="wrapper">
        <div class="item1 content"></div>
        <div class="item2 content">
            <div class="chart_wrapper">
                <canvas id="myChart"></canvas>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <script>
                const ctx = document.getElementById('myChart');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
                        datasets: [{
                            label: '# of Votes',
                            data: [12, 19, 3, 5, 2, 3],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            </script>
        </div>
        <div class="item3 content"><div id='refresh_button' class="reload">Button</div></div>
        <div class="item4 content"><div id='graph_selector'></div><div id='graph_value'></div></div>
        <div class="item5 content"></div>
        <div class="item6 content"></div>
        <div class="item7 content"></div>
    </div>
    <script type="text/javascript" src="js/content-distribution.js">event.preventDefault();</script>
</body>
</html>
